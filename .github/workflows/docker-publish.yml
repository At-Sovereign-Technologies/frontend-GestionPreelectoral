name: Publish image to GHCR

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VITE_API_GATEWAY_URL: ${{ vars.VITE_API_GATEWAY_URL || 'https://eleccion.sello-legitimo.site/' }}
      VITE_AUTHELIA_URL: ${{ vars.VITE_AUTHELIA_URL || 'https://auth.sello-legitimo.site/' }}
      VITE_OIDC_CLIENT_ID: ${{ vars.VITE_OIDC_CLIENT_ID || 'frontend-gestion-pre-electoral' }}
      VITE_OIDC_REDIRECT_URI: ${{ vars.VITE_OIDC_REDIRECT_URI || 'http://eleccion.sello-legitimo.site/' }}
      VITE_DEBUG_FRONTEND: ${{ vars.VITE_DEBUG_FRONTEND || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker image name (GHCR requires lowercase)
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            VITE_API_GATEWAY_URL=${{ env.VITE_API_GATEWAY_URL }}
            VITE_AUTHELIA_URL=${{ env.VITE_AUTHELIA_URL }}
            VITE_OIDC_CLIENT_ID=${{ env.VITE_OIDC_CLIENT_ID }}
            VITE_OIDC_REDIRECT_URI=${{ env.VITE_OIDC_REDIRECT_URI }}
            VITE_DEBUG_FRONTEND=${{ env.VITE_DEBUG_FRONTEND }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
